<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择题测评 - {{ module.title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .assessment-detail {
            background-color: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            margin-bottom: 30px;
            position: relative;
        }
        
        .assessment-detail::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #ff9a9e, #4ecdc4, #ffd93d);
        }
        
        .page-header {
            background: linear-gradient(135deg, #4ecdc4, #ff9a9e);
            padding: 40px;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .page-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 50 50"><circle cx="25" cy="25" r="2" fill="white" opacity="0.3"/></svg>');
            animation: float 20s linear infinite;
        }
        
        .page-title {
            font-size: 2.5em;
            margin-bottom: 15px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }
        
        .breadcrumb {
            font-size: 1.1em;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }
        
        .breadcrumb a {
            color: white;
            text-decoration: underline;
            transition: color 0.3s ease;
        }
        
        .breadcrumb a:hover {
            color: #ffd93d;
        }
        
        .content {
            padding: 40px;
        }
        
        .section-title {
            font-size: 1.8em;
            margin-bottom: 30px;
            color: #333;
            position: relative;
            padding-left: 30px;
        }
        
        .section-title::before {
            content: '❓';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .question-container {
            background-color: #f9f5ff;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .question-container::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 5px;
            background: linear-gradient(180deg, #4ecdc4, #ff9a9e);
        }
        
        .question-text {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 25px;
            color: #333;
            padding-left: 20px;
        }
        
        .options-list {
            margin-top: 25px;
            padding-left: 20px;
        }
        
        .option-item {
            margin-bottom: 20px;
            padding: 15px;
            background-color: white;
            border-radius: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .option-item:hover {
            background-color: #f0f9ff;
            transform: translateX(10px);
        }
        
        .option-item input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.3);
        }
        
        .option-item label {
            font-size: 1.1em;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        
        .option-item:hover label {
            color: #4ecdc4;
        }
        
        .submit-button {
            text-align: center;
            margin-top: 40px;
        }
        
        .btn-back {
            background-color: #6c757d;
            margin-right: 15px;
        }
        
        .btn-back:hover {
            background-color: #5a6268;
        }
        
        .btn-submit {
            background-color: #4ecdc4;
        }
        
        .btn-submit:hover {
            background-color: #45b7aa;
        }
        
        @media (max-width: 768px) {
            .page-header {
                padding: 30px;
            }
            
            .page-title {
                font-size: 2em;
            }
            
            .content {
                padding: 25px;
            }
            
            .question-text,
            .options-list {
                padding-left: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav-menu">
            <a href="{{ url_for('main.index') }}" class="nav-link">首页</a>
            <a href="{{ url_for('main.courses') }}" class="nav-link">课程列表</a>
            <a href="{{ url_for('main.course_detail', course_id=course.id) }}" class="nav-link">{{ course.title }}</a>
            <a href="{{ url_for('main.module_detail', course_id=course.id, module_id=module.id) }}" class="nav-link">{{ module.title }}</a>
            <a href="{{ url_for('main.assessments_list', course_id=course.id, module_id=module.id) }}" class="nav-link active">测评测试</a>
        </nav>
        
        <div class="assessment-detail">
            <div class="page-header">
                <div class="breadcrumb">
                    <a href="{{ url_for('main.course_detail', course_id=course.id) }}">{{ course.title }}</a> &gt; 
                    <a href="{{ url_for('main.module_detail', course_id=course.id, module_id=module.id) }}">{{ module.title }}</a> &gt; 
                    <a href="{{ url_for('main.assessments_list', course_id=course.id, module_id=module.id) }}">测评测试</a> &gt; 
                    选择题测评
                </div>
                <h1 class="page-title">选择题测评</h1>
            </div>
            
            <div class="content">
                <h2 class="section-title">问题</h2>
                
                <div class="question-container">
                    <div class="question-text">{{ assessment.question }}</div>
                    
                    <form action="{{ url_for('main.submit_assessment', course_id=course.id, module_id=module.id, assessment_id=assessment.id) }}" method="POST">
                        <div class="options-list">
                            {% for option in assessment.options %}
                            <div class="option-item">
                                <input type="radio" id="option{{ loop.index0 }}" name="answer" value="{{ loop.index0 }}">
                                <label for="option{{ loop.index0 }}">{{ option }}</label>
                            </div>
                            {% endfor %}
                        </div>
                        
                        <div class="submit-button">
                            <button type="submit" class="btn btn-submit">提交答案</button>
                        </div>
                    </form>
                </div>
                
                <div style="margin-top: 40px;">
                    <a href="{{ url_for('main.assessments_list', course_id=course.id, module_id=module.id) }}" class="btn btn-back">返回测评列表</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
