<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错误页面</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f9f5ff;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        .error-container {
            background-color: white;
            border-radius: 25px;
            padding: 50px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            max-width: 500px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        .error-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #ff9a9e, #4ecdc4, #ffd93d);
        }
        h1 {
            color: #ff6b6b;
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        p {
            font-size: 1.2em;
            margin-bottom: 30px;
            color: #666;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #4ecdc4;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.4);
        }
        .btn:hover {
            background-color: #45b7aa;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(78, 205, 196, 0.6);
        }
        @media (max-width: 768px) {
            .error-container {
                padding: 30px;
            }
            h1 {
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>😢 出错了！</h1>
        <p>{{ message }}</p>
        <a href="{{ url_for('main.courses') }}" class="btn">返回课程列表</a>
    </div>
</body>
</html>
