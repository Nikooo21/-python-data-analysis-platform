<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ exercise.title }} - 编程练习</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .exercise-detail {
            background-color: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            margin-bottom: 30px;
            position: relative;
        }
        
        .exercise-detail::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #ff9a9e, #4ecdc4, #ffd93d);
        }
        
        .page-header {
            background: linear-gradient(135deg, #4ecdc4, #ff9a9e);
            padding: 40px;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .page-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 50 50"><circle cx="25" cy="25" r="2" fill="white" opacity="0.3"/></svg>');
            animation: float 20s linear infinite;
        }
        
        .page-title {
            font-size: 2.5em;
            margin-bottom: 15px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }
        
        .breadcrumb {
            font-size: 1.1em;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }
        
        .breadcrumb a {
            color: white;
            text-decoration: underline;
            transition: color 0.3s ease;
        }
        
        .breadcrumb a:hover {
            color: #ffd93d;
        }
        
        .content {
            padding: 40px;
        }
        
        .section-title {
            font-size: 1.8em;
            margin-bottom: 25px;
            color: #333;
            position: relative;
            padding-left: 30px;
        }
        
        .section-title::before {
            content: '💻';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .exercise-description {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.8;
            background-color: #f9f5ff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .code-container {
            background-color: #f9f5ff;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .code-container::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 5px;
            background: linear-gradient(180deg, #4ecdc4, #ff9a9e);
        }
        
        .code-editor {
            background-color: #2d2d2d;
            color: #f8f8f2;
            padding: 25px;
            border-radius: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            overflow-x: auto;
            transition: transform 0.3s ease;
        }
        
        .code-container:hover .code-editor {
            transform: scale(1.01);
        }
        
        .solution-container {
            background-color: #f0f9ff;
            border-radius: 20px;
            padding: 30px;
            margin-top: 40px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .solution-container::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 5px;
            background: linear-gradient(180deg, #ffd93d, #ff9a9e);
        }
        
        .btn-back {
            background-color: #6c757d;
            margin-right: 15px;
        }
        
        .btn-back:hover {
            background-color: #5a6268;
        }
        
        .btn-solution {
            background-color: #ffd93d;
            color: #333;
        }
        
        .btn-solution:hover {
            background-color: #ffc107;
        }
        
        @media (max-width: 768px) {
            .page-header {
                padding: 30px;
            }
            
            .page-title {
                font-size: 2em;
            }
            
            .content {
                padding: 25px;
            }
            
            .code-container,
            .solution-container {
                padding: 20px;
            }
            
            .code-editor {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav-menu">
            <a href="{{ url_for('main.index') }}" class="nav-link">首页</a>
            <a href="{{ url_for('main.courses') }}" class="nav-link">课程列表</a>
            <a href="{{ url_for('main.course_detail', course_id=course.id) }}" class="nav-link">{{ course.title }}</a>
            <a href="{{ url_for('main.module_detail', course_id=course.id, module_id=module.id) }}" class="nav-link">{{ module.title }}</a>
            <a href="{{ url_for('main.exercises_list', course_id=course.id, module_id=module.id) }}" class="nav-link active">编程练习</a>
        </nav>
        
        <div class="exercise-detail">
            <div class="page-header">
                <div class="breadcrumb">
                    <a href="{{ url_for('main.course_detail', course_id=course.id) }}">{{ course.title }}</a> &gt; 
                    <a href="{{ url_for('main.module_detail', course_id=course.id, module_id=module.id) }}">{{ module.title }}</a> &gt; 
                    <a href="{{ url_for('main.exercises_list', course_id=course.id, module_id=module.id) }}">编程练习</a> &gt; 
                    {{ exercise.title }}
                </div>
                <h1 class="page-title">{{ exercise.title }}</h1>
            </div>
            
            <div class="content">
                <h2 class="section-title">练习说明</h2>
                <p class="exercise-description">{{ exercise.description }}</p>
                
                <h2 class="section-title">代码模板</h2>
                <div class="code-container">
                    <div class="code-editor">
                        {{ exercise.template }}
                    </div>
                </div>
                
                <div class="solution-container">
                    <h2 class="section-title">解决方案</h2>
                    <div class="code-container">
                        <div class="code-editor">
                            {{ exercise.solution }}
                        </div>
                    </div>
                </div>
                
                <div style="margin-top: 40px;">
                    <a href="{{ url_for('main.exercises_list', course_id=course.id, module_id=module.id) }}" class="btn btn-back">返回练习列表</a>
                    <a href="{{ url_for('main.module_detail', course_id=course.id, module_id=module.id) }}" class="btn">返回模块详情</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
